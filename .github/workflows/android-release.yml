name: Android Signed Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > ${{ runner.temp }}/release.jks
          echo "ANDROID_KEYSTORE_PATH=${{ runner.temp }}/release.jks" >> $GITHUB_ENV

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qNag-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: qNag ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Required GitHub repository secrets ──────────────────────────────────────
#
# ANDROID_KEYSTORE_BASE64   Base64-encoded release keystore (.jks)
# ANDROID_KEYSTORE_PASSWORD Keystore password
# ANDROID_KEY_ALIAS         Key alias inside the keystore
# ANDROID_KEY_PASSWORD      Key password
#
# To create a keystore:
#   keytool -genkeypair -v -keystore qnag-release.jks -alias qnag -keyalg RSA \
#     -keysize 2048 -validity 10000
#   base64 -i qnag-release.jks | pbcopy  (macOS) or base64 -w0 qnag-release.jks (Linux)
#
# Then add the output as the ANDROID_KEYSTORE_BASE64 secret in GitHub.
# Never commit the .jks file or passwords to the repository.
